services:
  # Layanan aplikasi utama gpt-load
  gpt-load:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barkah-gpt-load
    ports:
      # Memetakan port dari .env (default 3001) ke mesin lokal Anda
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      # Menggunakan file .env untuk konfigurasi
      - .env
    restart: always
    volumes:
      # Menyimpan data persisten (log, db sqlite jika digunakan) di luar container
      - ./data:/app/data
    stop_grace_period: ${SERVER_GRACEFUL_SHUTDOWN_TIMEOUT:-10}s
    healthcheck:
      test: wget -q --spider -T 10 -O /dev/null http://localhost:${PORT:-3001}/health
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: "postgres:16"
    container_name: gpt-load-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: gpt-load
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gpt-load"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Layanan cache Redis
  redis:
    image: redis:latest
    container_name: gpt-load-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
